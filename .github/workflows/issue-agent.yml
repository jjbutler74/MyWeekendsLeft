name: Issue Agent

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-agent:
    runs-on: ubuntu-latest

    # Only run automatically for new issues, or manually via workflow_dispatch.
    # Avoid running on PRs masquerading as issues.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request == null &&
       github.event.action == 'opened')

    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Fetch issue
        id: issue_body
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,author,labels,url \
            > issue.json

          cat issue.json

      - name: Triage issue with Codex
        id: triage
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: triage-result.json
          prompt: |
            You are triaging a GitHub issue for the repository jjbutler74/MyWeekendsLeft.

            Read issue.json.

            Decide whether the request is valid enough to implement.

            Valid means:
            - the request is understandable;
            - it appears relevant to this repository;
            - it is small enough for one PR;
            - it does not require secrets, credentials, private data, paid external services, or destructive actions;
            - it does not ask for unrelated rewrites or vague product direction;
            - it can be tested or at least verified.

            Invalid means:
            - unclear or missing acceptance criteria;
            - unrelated to this project;
            - unsafe;
            - too broad;
            - impossible to verify;
            - duplicate-looking without enough information.

            Output ONLY JSON in this shape:

            {
              "valid": true,
              "reason": "short reason",
              "summary": "what should be changed",
              "risk": "low|medium|high",
              "suggested_branch": "agent/issue-N-short-slug"
            }

      - name: Validate triage JSON
        id: triage_json
        run: |
          cat triage-result.json
          VALID=$(jq -r '.valid' triage-result.json)
          BRANCH=$(jq -r '.suggested_branch' triage-result.json)
          REASON=$(jq -r '.reason' triage-result.json)

          echo "valid=$VALID" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "reason<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REASON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment and label invalid issue
        if: steps.triage_json.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REASON: ${{ steps.triage_json.outputs.reason }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:needs-info" || true
          gh issue comment "$ISSUE_NUMBER" --body "Agent triage: I am not opening a PR for this yet.

          Reason: $REASON

          Please add clearer acceptance criteria or more context."

      - name: Create working branch
        if: steps.triage_json.outputs.valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.triage_json.outputs.branch }}"
          git checkout -b "$BRANCH"

      - name: Implement issue with Codex
        if: steps.triage_json.outputs.valid == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: implementation-notes.md
          prompt: |
            You are implementing a valid GitHub issue for jjbutler74/MyWeekendsLeft.

            Read issue.json and triage-result.json.

            Make the smallest safe code change that satisfies the issue.

            Rules:
            - Do not change unrelated files.
            - Do not rewrite the app.
            - Do not add new dependencies unless clearly necessary.
            - Prefer simple, maintainable code.
            - Update tests if tests exist.
            - If no tests exist, add a lightweight verification note in implementation-notes.md.
            - Do not commit.
            - Do not push.
            - Do not open the PR yourself.

            After editing, write implementation-notes.md with:
            - summary of changes;
            - files changed;
            - how to test;
            - any risks or assumptions.

      - name: Install dependencies and run checks
        if: steps.triage_json.outputs.valid == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          fi

          if npm run | grep -q "test"; then
            npm test
          fi

          if npm run | grep -q "build"; then
            npm run build
          fi

      - name: Commit and push changes
        if: steps.triage_json.outputs.valid == 'true'
        id: commit
        env:
          BRANCH: ${{ steps.triage_json.outputs.branch }}
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add .
          git commit -m "Fix issue #${{ steps.issue.outputs.number }}"
          git push origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.triage_json.outputs.valid == 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          BRANCH: ${{ steps.triage_json.outputs.branch }}
        run: |
          TITLE=$(jq -r '.title' issue.json)
          SUMMARY=$(jq -r '.summary' triage-result.json)
          RISK=$(jq -r '.risk' triage-result.json)
          REASON=$(jq -r '.reason' triage-result.json)

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --draft \
            --title "Issue #$ISSUE_NUMBER: $TITLE" \
            --body "$(cat <<EOF
          ## Agent-generated PR

          Fixes #$ISSUE_NUMBER

          ## Triage

          **Valid:** yes  
          **Reason:** $REASON  
          **Risk:** $RISK

          ## Intended change

          $SUMMARY

          ## Implementation notes

          $(cat implementation-notes.md)
          EOF
          )"

      - name: Comment if no changes made
        if: steps.triage_json.outputs.valid == 'true' && steps.commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Agent triage marked this as valid, but no code changes were produced. This likely needs human review."
