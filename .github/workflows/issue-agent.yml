name: Issue Agent

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-agent:
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request == null &&
       github.event.action == 'opened')

    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,author,labels,url \
            > issue.json

          cat issue.json

      - name: Check OpenAI key is present
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is empty or not available to this workflow."
            exit 1
          fi

          echo "OPENAI_API_KEY is present."
          echo "Length: ${#OPENAI_API_KEY}"
          echo "Prefix: ${OPENAI_API_KEY:0:7}..."
      
      - name: Test OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          curl -sS https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -o models.json

          head -c 300 models.json
          
      - name: Triage issue with Codex CLI
        id: triage
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export OPENAI_API_KEY
          npx -y @openai/codex exec --dangerously-bypass-approvals-and-sandbox "$(cat <<'EOF'
          You are triaging a GitHub issue for the repository jjbutler74/MyWeekendsLeft.

          Read issue.json.

          Decide whether the request is valid enough to implement.

          Valid means:
          - the request is understandable;
          - it appears relevant to this repository;
          - it is small enough for one PR;
          - it does not require secrets, credentials, private data, paid external services, or destructive actions;
          - it does not ask for unrelated rewrites or vague product direction;
          - it can be tested or at least verified.

          Invalid means:
          - unclear or missing acceptance criteria;
          - unrelated to this project;
          - unsafe;
          - too broad;
          - impossible to verify;
          - duplicate-looking without enough information.

          Write ONLY JSON to triage-result.json in this shape:

          {
            "valid": true,
            "reason": "short reason",
            "summary": "what should be changed",
            "risk": "low|medium|high",
            "suggested_branch": "agent/issue-N-short-slug"
          }

          Use the actual issue number in the branch name.
          Keep the branch name lowercase and safe for Git.
          EOF
          )"

          echo "Triage result:"
          cat triage-result.json

      - name: Validate triage JSON
        id: triage_json
        run: |
          echo "Triage output:"
          cat triage-result.json

          VALID=$(jq -r '.valid // false' triage-result.json)
          BRANCH=$(jq -r '.suggested_branch // empty' triage-result.json)
          REASON=$(jq -r '.reason // "No reason provided."' triage-result.json)

          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            BRANCH="agent/issue-${{ steps.issue.outputs.number }}"
          fi

          echo "valid=$VALID" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          echo "reason<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REASON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment and label invalid issue
        if: steps.triage_json.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REASON: ${{ steps.triage_json.outputs.reason }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:needs-info" || true

          gh issue comment "$ISSUE_NUMBER" --body "Agent triage: I am not opening a PR for this yet.

          Reason: $REASON

          Please add clearer acceptance criteria or more context."

      - name: Create working branch
        if: steps.triage_json.outputs.valid == 'true'
        env:
          BRANCH: ${{ steps.triage_json.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

      - name: Label accepted issue
        if: steps.triage_json.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:accepted" || true

      - name: Implement issue with Codex CLI
        if: steps.triage_json.outputs.valid == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export OPENAI_API_KEY
          npx -y @openai/codex exec --dangerously-bypass-approvals-and-sandbox "$(cat <<'EOF'
          You are implementing a valid GitHub issue for jjbutler74/MyWeekendsLeft.

          Read issue.json and triage-result.json.

          Make the smallest safe code change that satisfies the issue.

          Rules:
          - Do not change unrelated files.
          - Do not rewrite the app.
          - Do not add new dependencies unless clearly necessary.
          - Prefer simple, maintainable code.
          - Update tests if tests exist.
          - If no tests exist, add a lightweight verification note in implementation-notes.md.
          - Do not commit.
          - Do not push.
          - Do not open the PR yourself.

          After editing, write implementation-notes.md with:
          - summary of changes;
          - files changed;
          - how to test;
          - any risks or assumptions.
          EOF
          )"

          if [ ! -f implementation-notes.md ]; then
            echo "Codex did not create implementation-notes.md" > implementation-notes.md
          fi

      - name: Install dependencies
        if: steps.triage_json.outputs.valid == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            echo "No recognised JS lockfile found. Skipping dependency install."
          fi

      - name: Run checks
        if: steps.triage_json.outputs.valid == 'true'
        run: |
          if [ -f package.json ]; then
            if npm run | grep -qE " test$| test "; then
              npm test
            else
              echo "No npm test script found."
            fi

            if npm run | grep -qE " build$| build "; then
              npm run build
            else
              echo "No npm build script found."
            fi
          else
            echo "No package.json found. Skipping npm checks."
          fi

      - name: Commit and push changes
        if: steps.triage_json.outputs.valid == 'true'
        id: commit
        env:
          BRANCH: ${{ steps.triage_json.outputs.branch }}
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git status
          git add .
          git commit -m "Fix issue #${{ steps.issue.outputs.number }}"
          git push origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.triage_json.outputs.valid == 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          BRANCH: ${{ steps.triage_json.outputs.branch }}
        run: |
          TITLE=$(jq -r '.title' issue.json)
          SUMMARY=$(jq -r '.summary // "No summary provided."' triage-result.json)
          RISK=$(jq -r '.risk // "unknown"' triage-result.json)
          REASON=$(jq -r '.reason // "No reason provided."' triage-result.json)

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --draft \
            --title "Issue #$ISSUE_NUMBER: $TITLE" \
            --body "$(cat <<EOF
          ## Agent-generated PR

          Fixes #$ISSUE_NUMBER

          ## Triage

          **Valid:** yes  
          **Reason:** $REASON  
          **Risk:** $RISK

          ## Intended change

          $SUMMARY

          ## Implementation notes

          $(cat implementation-notes.md)
          EOF
          )"

          gh issue edit "$ISSUE_NUMBER" --add-label "agent:pr-created" || true

      - name: Comment if no changes made
        if: steps.triage_json.outputs.valid == 'true' && steps.commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:human-review" || true

          gh issue comment "$ISSUE_NUMBER" --body "Agent triage marked this as valid, but no code changes were produced. This needs human review."
